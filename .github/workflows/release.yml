name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: stacksjs/action-releaser@v1.2.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
